<!DOCTYPE html>
<html>
<head>
  <title>Purchase</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body onload="protectPage(); loadSuppliers(); loadMedicines()">

<div class="layout">

<div class="sidebar">
  <h2>Pharmacy</h2>
  <a href="dashboard.html">Dashboard</a>
  <a href="medicines.html">Medicines</a>
  <a href="billing.html">Billing</a>
  <a href="purchase.html">Purchase</a>
  <a href="suppliers.html">Suppliers</a>
  <a href="#" onclick="logout()">Logout</a>
</div>

<div class="main">
  <h2>Add Purchase</h2>

  <div class="card">

    <select id="supplierSelect"></select>
    <select id="medicineSelect"></select>

    <input id="quantity" placeholder="Quantity">
    <input id="price" placeholder="Purchase Price">

    <button onclick="addPurchase()">Add Purchase</button>
  </div>

</div>

</div>

<script src="js/app.js"></script>

<script>

async function loadSuppliers() {
  const token = localStorage.getItem("token");

  const res = await fetch("http://localhost:5000/suppliers", {
    headers: { "Authorization": "Bearer " + token }
  });

  const data = await res.json();

  const select = document.getElementById("supplierSelect");
  select.innerHTML = "";

  data.forEach(supplier => {
    const option = document.createElement("option");
    option.value = supplier._id;
    option.text = supplier.name;
    select.appendChild(option);
  });
}

async function loadMedicines() {
  const token = localStorage.getItem("token");

  const res = await fetch("http://localhost:5000/medicines", {
    headers: { "Authorization": "Bearer " + token }
  });

  const data = await res.json();

  const select = document.getElementById("medicineSelect");
  select.innerHTML = "";

  data.data.forEach(medicine => {
    const option = document.createElement("option");
    option.value = medicine._id;
    option.text = medicine.name;
    select.appendChild(option);
  });
}

async function addPurchase() {
  const token = localStorage.getItem("token");

  await fetch("http://localhost:5000/purchase/create", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + token
    },
    body: JSON.stringify({
      supplierId: supplierSelect.value,
      medicineId: medicineSelect.value,
      quantity: parseInt(quantity.value),
      purchasePrice: parseFloat(price.value)
    })
  });

  alert("Purchase Added");
}

</script>

</body>
</html>
