<!DOCTYPE html>
<html>
<head>
  <title>Confirm Supplier</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body onload="loadPreview()">

<div class="layout">

  <div class="sidebar">
    <h2>Pharmacy</h2>
    <a href="dashboard.html">Dashboard</a>
    <a href="medicines.html">Medicines</a>
    <a href="billing.html">Billing</a>
    <a href="purchase.html">Purchase</a>
    <a href="suppliers.html">Suppliers</a>
    <a href="#" onclick="logout()">Logout</a>
  </div>

  <div class="main">

    <h2>Confirm Supplier Details</h2>

    <div class="card">
      <p><strong>Name:</strong> <span id="previewName"></span></p>
      <p><strong>Phone:</strong> <span id="previewPhone"></span></p>
      <p><strong>Address:</strong> <span id="previewAddress"></span></p>
      <p><strong>GST:</strong> <span id="previewGst"></span></p>

      <br>

      <button onclick="confirmSave()">Confirm / Save</button>
      <button style="background:#6b7280;" onclick="editBack()">Edit</button>
    </div>

  </div>

</div>

<script src="js/app.js"></script>

<script>

function loadPreview() {

  const data = JSON.parse(localStorage.getItem("tempSupplier"));

  if (!data) {
    window.location.href = "suppliers.html";
    return;
  }

  document.getElementById("previewName").innerText = data.name;
  document.getElementById("previewPhone").innerText = data.phone;
  document.getElementById("previewAddress").innerText = data.address;
  document.getElementById("previewGst").innerText = data.gst;
}

async function confirmSave() {

  const token = localStorage.getItem("token");
  const data = JSON.parse(localStorage.getItem("tempSupplier"));

  const res = await fetch("http://localhost:5000/suppliers/add", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + token
    },
    body: JSON.stringify(data)
  });

  if (res.ok) {
    localStorage.removeItem("tempSupplier");
    window.location.href = "suppliers.html";
  }
}

function editBack() {
  window.location.href = "suppliers.html";
}

</script>

</body>
</html>
