<!DOCTYPE html>
<html>
<head>
  <title>Billing</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body onload="protectPage()">

<div class="layout">

  <!-- Sidebar -->
  <div class="sidebar">
    <h2>Pharmacy</h2>
    <a href="dashboard.html">Dashboard</a>
    <a href="medicines.html">Medicines</a>
    <a href="billing.html">Billing</a>
    <a href="purchase.html">Purchase</a>
    <a href="suppliers.html">Suppliers</a>
    <a href="#" onclick="logout()">Logout</a>
  </div>

  <!-- Main -->
  <div class="main">
    <h2>Create Bill</h2>

    <div class="card">
      <input id="customerName" placeholder="Customer Name">
      <input id="medicineId" placeholder="Medicine ID">
      <input id="quantity" placeholder="Quantity">
      <button onclick="createBill()">Generate Bill</button>
    </div>

    <div class="card">
      <h3>Bill Result</h3>
      <p id="result"></p>
    </div>

  </div>

</div>

<script src="js/app.js"></script>

<script>
async function createBill() {

  const token = localStorage.getItem("token");

  const customerName = document.getElementById("customerName").value;
  const medicineId = document.getElementById("medicineId").value;
  const quantity = parseInt(document.getElementById("quantity").value);

  try {

    const res = await fetch("http://localhost:5000/bills/create", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + token
      },
      body: JSON.stringify({
        customerName,
        medicineId,
        quantity
      })
    });

    const data = await res.json();

    if (res.ok) {
      document.getElementById("result").innerText =
        "Bill Created | Total: ₹ " + data.totalAmount;
    } else {
      document.getElementById("result").innerText =
        data.message || "Error creating bill";
    }

  } catch (err) {
    document.getElementById("result").innerText = "Server Error";
  }
}
</script>

</body>
</html>
